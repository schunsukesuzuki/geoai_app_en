services:
  backend:
    build:
      context: ./backend
    container_name: regional-risk-backend
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    volumes:
      - ./backend/app/data:/app/app/data

  frontend:
    build:
      context: ./frontend
    container_name: regional-risk-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
